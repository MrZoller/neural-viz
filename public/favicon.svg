<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- dark background -->
  <rect width="32" height="32" rx="6" fill="#0f172a"/>

  <!-- edges: input → hidden (blue) -->
  <line x1="8"  y1="10" x2="17" y2="10" stroke="#3b82f6" stroke-width="1.2" stroke-opacity="0.8"/>
  <line x1="8"  y1="10" x2="17" y2="22" stroke="#3b82f6" stroke-width="1.2" stroke-opacity="0.5"/>
  <line x1="8"  y1="22" x2="17" y2="10" stroke="#3b82f6" stroke-width="1.2" stroke-opacity="0.5"/>
  <line x1="8"  y1="22" x2="17" y2="22" stroke="#3b82f6" stroke-width="1.2" stroke-opacity="0.8"/>

  <!-- edges: hidden → output (amber) -->
  <line x1="17" y1="10" x2="26" y2="16" stroke="#f59e0b" stroke-width="1.4" stroke-opacity="0.9"/>
  <line x1="17" y1="22" x2="26" y2="16" stroke="#f59e0b" stroke-width="1.4" stroke-opacity="0.9"/>

  <!-- input nodes (blue) -->
  <circle cx="8"  cy="10" r="3" fill="#60a5fa"/>
  <circle cx="8"  cy="22" r="3" fill="#60a5fa"/>

  <!-- hidden nodes (amber) -->
  <circle cx="17" cy="10" r="3" fill="#f59e0b"/>
  <circle cx="17" cy="22" r="3" fill="#f59e0b"/>

  <!-- output node (emerald) -->
  <circle cx="26" cy="16" r="3.5" fill="#34d399"/>
</svg>
