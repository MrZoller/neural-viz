name: CI

on:
  # Pushes to main are covered by the Pages workflow (which also tests + builds
  # before deploying), so CI here gates pull requests and non-main branch pushes
  # to avoid running the full test + build twice on every push to main.
  push:
    branches-ignore: [main]
  pull_request:

jobs:
  test:
    name: Test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build
